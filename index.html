<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UK Solo Ark Shop - Server 5977</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;overflow-y:auto}

/* ── Landing ── */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;background:linear-gradient(160deg,#12192e 0%,#1a1a2e 60%,#0f3460 100%)}
.landing h1{font-size:clamp(1.8rem,5vw,3rem);font-weight:800;color:#e94560;text-align:center;letter-spacing:1px;margin-bottom:.4rem}
.landing p{color:#666;font-size:14px;text-align:center;margin-bottom:2.5rem}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:700px}
.welcome-box{background:#16213e;border:1px solid #0f3460;border-radius:12px;padding:16px 20px;max-width:600px;width:100%;margin-bottom:2rem;text-align:left}
.welcome-box p{color:#aaa;font-size:13px;line-height:1.7;margin:0}
.cat-btn{background:#16213e;border:1px solid #0f3460;border-radius:14px;padding:18px 10px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:border-color .2s,transform .15s,background .2s}
.cat-btn:hover{border-color:#e94560;background:#1e2a4a;transform:translateY(-3px)}
.cat-btn.all-btn{background:#e94560;border-color:#e94560}
.cat-btn.all-btn:hover{background:#c73652;border-color:#c73652}
.cat-emoji{font-size:2.2rem;line-height:1}
.cat-label{font-size:11px;font-weight:600;color:#aaa;text-align:center;text-transform:uppercase;letter-spacing:.6px;line-height:1.3}
.cat-btn.all-btn .cat-label{color:#fff}

/* ── Shop (hidden until button clicked) ── */
.shop{display:none;flex-direction:column;min-height:100vh;width:100%}
body.in-shop .landing{display:none}
body.in-shop{overflow-y:auto}
body.in-shop .shop{display:block}

/* ── Header ── */
.shop-header{background:#16213e;padding:.5rem 1rem;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:8px;border-bottom:1px solid #0f3460;position:sticky;top:0;z-index:26;min-height:54px}
@media(max-width:768px){.shop-header{padding:.3rem .5rem;gap:4px}}
@media(max-width:768px){.shop-header h1{font-size:clamp(.7rem,2.5vw,.85rem);letter-spacing:0}}
.shop-header h1{font-size:clamp(1rem,2.5vw,1.4rem);font-weight:800;color:#e94560;letter-spacing:1px;text-align:center}
.header-right{display:flex;align-items:center;gap:10px}
#count{font-size:12px;color:#888}
.back-btn{background:#0f3460;color:#aaa;border:1px solid #0f3460;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;flex-shrink:0}
@media(max-width:768px){.back-btn{padding:4px 8px;font-size:11px}}
.back-btn:hover{border-color:#e94560;color:#fff}
.basket-btn{background:#e94560;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;flex-shrink:0}
.basket-btn:hover{background:#c73652}
.basket-count{background:#fff;color:#e94560;border-radius:20px;min-width:28px;height:20px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e9e4e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Controls ── */
.controls{padding:.75rem 1.5rem;display:flex;gap:8px;flex-wrap:wrap;background:#16213e;border-bottom:1px solid #0f3460;overflow-x:auto;scrollbar-width:none;position:sticky;top:var(--header-h,54px);z-index:17}
.controls::-webkit-scrollbar{display:none}
input,select{padding:7px 10px;border:1px solid #0f3460;border-radius:8px;font-size:13px;background:#0f3460;color:#e0e0e0;outline:none}
input:focus,select:focus{border-color:#e94560}
#typeFilter{flex-shrink:0}
#search{flex:1;min-width:140px}
select option{background:#16213e}
.sidebar-toggle{background:#0f3460;border:1px solid #0f3460;color:#aaa;border-radius:8px;padding:6px 10px;font-size:16px;cursor:pointer;line-height:1;flex-shrink:0}
.sidebar-toggle:hover{border-color:#e94560;color:#fff}

/* ── Shop body + sidebar ── */
.shop-body{display:flex;min-height:calc(100vh - 104px)}
.sidebar{width:200px;overflow-y:auto;background:#12192e;border-right:1px solid #0f3460;display:flex;flex-direction:column;transition:width .25s;flex-shrink:0;position:fixed;top:var(--sidebar-top,104px);left:0;height:calc(100vh - var(--sidebar-top,104px));z-index:18;scrollbar-width:thin;scrollbar-color:#0f3460 transparent}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-track{background:transparent}.sidebar::-webkit-scrollbar-thumb{background:#0f3460;border-radius:4px}.sidebar::-webkit-scrollbar-thumb:hover{background:#e94560}
@media(max-width:768px){.sidebar{width:200px;left:-200px;transition:left .25s}}
@media(max-width:768px){.grid{margin-left:0!important}}
@media(max-width:768px){.sidebar.open{left:0}}
.sidebar.closed{width:0;overflow:hidden}
.sidebar-header{padding:12px 16px;font-size:11px;font-weight:700;color:#e94560;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #0f3460;white-space:nowrap}
.sidebar-items{display:flex;flex-direction:column;padding:8px 0}
.sidebar-item{padding:7px 16px;font-size:13px;color:#aaa;cursor:pointer;white-space:nowrap;border-left:3px solid transparent;transition:background .15s,color .15s}
.sidebar-item:hover{background:#1a2a4a;color:#e0e0e0}
.sidebar-item.active{color:#e94560;border-left-color:#e94560;background:#1a1a2e;font-weight:600}
.sidebar-type{padding:10px 16px 6px;font-size:10px;font-weight:700;color:#e94560;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;cursor:pointer;margin-top:4px;display:flex;align-items:center;justify-content:space-between;user-select:none}
.sidebar-type:hover{color:#ff6b7a}
.sidebar-arrow{font-size:9px;transition:transform .2s;margin-left:6px}
.sidebar-type.collapsed .sidebar-arrow{transform:rotate(-90deg)}
.sidebar-child{padding-left:24px;font-size:12px}
.sidebar-child.hidden{display:none}

/* ── Grid ── */
.grid{flex:1;min-width:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:1.5rem;align-content:start;margin-left:var(--grid-left,200px)}

/* ── Cards ── */
.card{background:#16213e;border-radius:12px;border:1px solid #0f3460;overflow:hidden;display:flex;flex-direction:column;transition:border-color .2s,transform .15s;cursor:pointer}
.card:hover{border-color:#e94560;transform:translateY(-2px)}
.card-header{padding:10px 14px;border-bottom:1px solid #0f3460;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.card-name{font-weight:700;font-size:15px;flex:1;text-align:center}
.level-badge{font-size:12px;font-weight:600;padding:3px 8px;border-radius:20px;background:#e94560;color:#fff;white-space:nowrap;flex-shrink:0}
.inv-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;flex-shrink:0}
.card-img{width:100%;height:180px;overflow:hidden;background:#0f3460;position:relative;display:flex;align-items:center;justify-content:center}
.card-img img{width:100%;height:100%;object-fit:contain;padding:8px;opacity:0;transition:opacity .3s}
.card-img img.loaded{opacity:1}
.card-img img.errored{display:none}
.img-placeholder{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;color:#444;font-size:12px;opacity:.6;text-align:center;padding:8px}
.sel-bar{padding:8px 16px;border-bottom:1px solid #0f3460;text-align:center}
.sel-bar.variant{background:#0f3460}
.sel-bar.gender{background:#12294a}
.sel-bar.qty{background:#0d2236}
.sel-bar label{font-size:11px;color:#888;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.7px;text-align:center}
.sel-bar select{width:100%;padding:6px 10px;font-size:13px;border-radius:6px;border:1px solid #1a1a2e;background:#16213e;color:#e0e0e0}
.var-count{font-size:10px;color:#e0e0e0;margin-left:5px;font-weight:400}
.info-bar{padding:8px 16px;border-bottom:1px solid #0f3460;background:#111827;text-align:center}
.info-text{font-size:12px;color:#aaa;line-height:1.5;text-align:center}
.colour-id-bar{padding:8px 16px;border-bottom:1px solid #0f3460;background:#0d1f38;text-align:center}
.colour-id-bar label{font-size:11px;color:#888;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.7px}
.colour-id-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.cid-item{background:#0f3460;border-radius:5px;padding:3px 4px;text-align:center}
.cid-label{font-size:8px;color:#4a6a8a;margin-bottom:1px;text-transform:uppercase}
.cid-value{font-size:11px;font-weight:600;color:#7ec8e3}
.card-body{padding:12px 16px;display:flex;flex-direction:column;gap:6px;flex:1}
.section-title{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;margin-top:4px;text-align:center}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.res-item{background:#0f3460;border-radius:6px;padding:5px 6px;text-align:center}
.res-label{font-size:10px;color:#888;margin-bottom:2px}
.res-value{font-size:13px;font-weight:600;color:#555;text-align:center}
.res-value.hv{color:#e94560}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.stat-item{background:#0a2a40;border-radius:6px;padding:4px 6px;text-align:center}
.stat-header{font-size:10px;font-weight:600;white-space:nowrap;margin-bottom:2px;display:flex;align-items:center;justify-content:center;gap:2px}
.stat-name{color:#6a9aaa;text-transform:uppercase;letter-spacing:.4px}
.stat-hsep{color:#3a6a7a;margin:0 2px;font-weight:400}
.stat-v1{color:#7ec8e3}
.stat-value-row{font-size:9px;color:#3a6a7a;white-space:nowrap;text-align:center}
.stat-val{font-size:11px;font-weight:600;color:#7ec8e3;display:block;margin-top:1px}
.add-btn{margin:12px 16px 14px;padding:9px;background:#e94560;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;width:calc(100% - 32px)}
.add-btn:hover{background:#c73652}
.add-btn.no-stock{background:#333;color:#666;cursor:not-allowed}
.add-btn.no-stock:hover{background:#333}

/* ── Mobile overlay ── */
.card-overlay{display:none;position:fixed;inset:0;z-index:40;background:#1a1a2e;flex-direction:column;overflow:hidden}
.card-overlay.open{display:flex}
.overlay-bar{background:#16213e;padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #0f3460;flex-shrink:0}
.overlay-close{background:none;border:none;color:#aaa;font-size:22px;cursor:pointer;padding:0;line-height:1}
.overlay-nav{display:flex;align-items:center;gap:10px}
.overlay-arrow{background:#0f3460;border:1px solid #0f3460;color:#aaa;border-radius:8px;padding:6px 12px;font-size:18px;cursor:pointer;line-height:1}
.overlay-arrow:hover{border-color:#e94560;color:#fff}
.overlay-arrow:disabled{opacity:.3;cursor:not-allowed}
.overlay-pos{font-size:12px;color:#666;min-width:50px;text-align:center}
.overlay-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;width:100%;max-width:100vw}
.swipe-hint{text-align:center;padding:6px;font-size:11px;color:#333;flex-shrink:0}

/* ── Basket ── */
.basket-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50}
.basket-overlay.open{display:block}
.basket-panel{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:100vw;background:#16213e;border-left:1px solid #0f3460;z-index:51;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s;overflow:hidden}
.basket-panel.open{transform:translateX(0)}
.basket-top{padding:1rem 1.5rem;border-bottom:1px solid #0f3460;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.basket-top h2{font-size:1.1rem;font-weight:700;color:#e94560}
.basket-slots{font-size:12px;color:#888;margin-top:2px}
.close-btn{background:none;border:none;color:#888;font-size:22px;cursor:pointer;line-height:1;padding:0}
.close-btn:hover{color:#fff}
.basket-items{flex:1;overflow-y:auto;padding:.75rem 1.5rem;display:flex;flex-direction:column;gap:8px;min-height:0}
.basket-empty{text-align:center;color:#555;margin-top:3rem;font-size:14px}
.basket-item{background:#0f3460;border-radius:10px;padding:12px 14px;position:relative;display:flex;flex-direction:column;gap:3px}
.bi-name{font-weight:600;font-size:14px;color:#fff;padding-right:24px}
.bi-detail{font-size:12px;color:#aaa}
.bi-cost{font-size:12px;color:#e94560;font-weight:600}
.bi-remove{position:absolute;top:8px;right:8px;background:#e94560;border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;line-height:1;padding:3px 7px;border-radius:6px}
.bi-remove:hover{background:#c73652}
.checkout-form{padding:.75rem 1.5rem;border-top:1px solid #0f3460;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.checkout-form-fields{display:flex;flex-direction:column;gap:8px}
.checkout-form h3{font-size:14px;font-weight:600;color:#e0e0e0}
.form-row{display:flex;flex-direction:column;gap:4px}
.form-row label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.6px}
.form-row input,.form-row textarea,.form-row select{width:100%;padding:8px 10px;border:1px solid #0f3460;border-radius:8px;background:#0f3460;color:#e0e0e0;font-size:13px;outline:none}
.form-row input:focus,.form-row textarea:focus,.form-row select:focus{border-color:#e94560}
.form-row textarea{resize:vertical;min-height:44px;max-height:100px}
.tribe-row{display:flex;align-items:center;gap:10px;background:#0f3460;border-radius:8px;padding:10px 12px}
.tribe-row label{font-size:13px;color:#aaa;cursor:pointer;display:flex;align-items:center;gap:8px;flex:1}
.tribe-row input[type="checkbox"]{width:16px;height:16px;cursor:pointer;accent-color:#e94560}
.discount-badge{font-size:11px;font-weight:700;color:#66cc88;background:rgba(30,158,78,0.3);padding:2px 8px;border-radius:10px;white-space:nowrap}
.order-summary{background:#0f3460;border-radius:8px;padding:10px 12px;font-size:13px;color:#aaa;display:flex;flex-direction:column;gap:4px}
.os-row{display:flex;justify-content:space-between;gap:8px}
.os-row span:last-child{color:#e0e0e0;font-weight:600;white-space:nowrap}
.os-total{border-top:1px solid #1a1a2e;margin-top:6px;padding-top:6px}
.os-total span{color:#e94560 !important}
.os-saving{border-top:1px solid #1a1a2e;margin-top:4px;padding-top:4px;color:#66cc88 !important}
.checkout-btn{padding:11px;background:#e94560;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;width:100%}
.checkout-btn:hover{background:#c73652}
.checkout-btn:disabled{background:#444;cursor:not-allowed}
.form-msg{font-size:13px;text-align:center;min-height:18px}
.form-msg.ok{color:#66cc88}.form-msg.err{color:#e94560}
.empty{text-align:center;padding:4rem;color:#555;font-size:15px;grid-column:1/-1}
.loading-msg{text-align:center;padding:4rem;color:#555;font-size:15px;grid-column:1/-1}
.error-msg{text-align:center;padding:4rem;color:#e94560;font-size:14px;grid-column:1/-1;line-height:1.8}
*::-webkit-scrollbar{width:4px;height:4px}*::-webkit-scrollbar-track{background:transparent}*::-webkit-scrollbar-thumb{background:#0f3460;border-radius:4px}*::-webkit-scrollbar-thumb:hover{background:#e94560}*{scrollbar-width:thin;scrollbar-color:#0f3460 transparent}
.queue-item{background:#1a1a2e;border:1px solid #0f3460;border-radius:8px;padding:12px 16px;margin-bottom:10px}.queue-item.queue-mine{border-color:#e94560;background:#1e1a2e}.queue-num{font-size:22px;font-weight:800;color:#e94560;margin-right:10px}.queue-name{font-size:14px;font-weight:600;color:#e0e0e0}.queue-time{font-size:11px;color:#aaa;margin-left:8px}.queue-creatures{font-size:12px;color:#aaa;margin-top:4px;padding-left:4px}.queue-you{font-size:10px;font-weight:700;background:#e94560;color:#fff;border-radius:4px;padding:1px 5px;margin-left:6px;vertical-align:middle}
</style>
</head>
<body>

<!-- ── Landing ── -->
<div class="landing" id="landing">
  <h1 id="landingTitle" style="opacity:0"> </h1>
  <p id="landingSubtitle" style="opacity:0"> </p>
  <div class="welcome-box" id="welcomeBox" style="opacity:0"><p id="welcomeText"> </p></div>
  <div class="cat-grid">
    <button class="cat-btn" data-type="New in" style="grid-column:1/-1;padding:12px 10px"><span class="cat-emoji">✨</span><span class="cat-label">New In Shop</span></button>
    <button class="cat-btn all-btn" id="btn-all"><span class="cat-emoji">🦕</span><span class="cat-label">All</span></button>
    <button class="cat-btn" data-type="Items"><span class="cat-emoji">📦</span><span class="cat-label">Items</span></button>
    <button class="cat-btn" data-type="Boss Dinos"><span class="cat-emoji">👑</span><span class="cat-label">Boss Dinos</span></button>
    <button class="cat-btn" data-type="Flying"><span class="cat-emoji">🦅</span><span class="cat-label">Flying Dinos</span></button>
    <button class="cat-btn" data-type="Water"><span class="cat-emoji">🌊</span><span class="cat-label">Water Dinos</span></button>
    <button class="cat-btn" data-type="DPS / Soaker"><span class="cat-emoji">⚔️</span><span class="cat-label">DPS / Soaker</span></button>
    <button class="cat-btn" data-type="Utility"><span class="cat-emoji">🔧</span><span class="cat-label">Utility Dinos</span></button>
    <button class="cat-btn" data-type="Shoulder Pets and Companions"><span class="cat-emoji">🐾</span><span class="cat-label">Shoulder Pets</span></button>
    <button class="cat-btn" data-type="Single Clones"><span class="cat-emoji">🧬</span><span class="cat-label">Single Clones</span></button>
  </div>
</div>

<!-- ── Shop ── -->
<div class="shop" id="shop">
  <div class="shop-header">
    <button class="back-btn" id="backBtn">&#8592; Back</button>
    <h1>UK Solo Ark Shop<br><span style="font-size:11px;color:#888;font-weight:400">Server 5977 · Coords 85/68 · Discord: Captain Nick#4954</span></h1>
    <div class="header-right">
      <span id="count"></span>
      <button class="basket-btn" id="basketOpenBtn">Basket <span class="basket-count" id="basketCount">0</span></button>
    </div>
  </div>
  <div class="controls">
    <button class="sidebar-toggle" id="sidebarToggle">Dino List</button>
    <select id="typeFilter"><option value="">All types</option></select>
    <select id="stockFilter" onchange="applyFilters()"><option value="">All stock</option><option value="in stock">In Stock</option><option value="low stock">Low Stock</option><option value="no stock">No Stock</option></select>
    <input id="search" type="text" placeholder="Search creatures...">
    <select id="creatureFilter"><option value="">All creatures</option></select>
    <select id="variantFilter"><option value="">All variants</option></select>
  </div>
  <div class="shop-body">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header" style="display:flex;align-items:center;justify-content:space-between;gap:4px"><span>Browse</span><button id="sidebarViewToggle" onclick="toggleSidebarView()" style="background:#0f3460;border:1px solid #0f3460;color:#aaa;border-radius:6px;padding:2px 7px;font-size:11px;cursor:pointer;flex-shrink:0;white-space:nowrap">A→Z</button></div>
      <div class="sidebar-items" id="sidebarItems"></div>
    </div>
    <div class="grid" id="grid"><p class="loading-msg">Loading creatures...</p></div>
  </div>
</div>

<!-- ── Mobile overlay ── -->
<div class="card-overlay" id="cardOverlay">
  <div class="overlay-bar">
    <button class="overlay-close" id="overlayClose">&#x2715;</button>
    <div class="overlay-nav">
      <button class="overlay-arrow" id="overlayPrev">&#8592;</button>
      <span class="overlay-pos" id="overlayPos"></span>
      <button class="overlay-arrow" id="overlayNext">&#8594;</button>
    </div>
    <button class="basket-btn" id="overlayBasketBtn" style="padding:6px 10px;font-size:12px">Basket <span class="basket-count" id="overlayBasketCount">0</span></button>
  </div>
  <div class="overlay-content" id="overlayContent"></div>
  <div class="swipe-hint" id="swipeHint">&#8592; swipe to browse &#8594;</div>
</div>

<!-- ── Basket ── -->
<div id="toast" class="toast">Added to Basket!</div>
  <div class="basket-overlay" id="basketOverlay"></div>
<div class="basket-panel" id="basketPanel">
  <div class="basket-top">

// ── FETCH DATA FROM SHEETS API ────────────────────────────────
function loadData() {
  var base = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/';
  var key  = 'AIzaSyBcG7QFFQrWg4Wqgc2dSqGLGM5zg1BbINc'; // public read-only API key

  Promise.all([
    fetch(base + encodeURIComponent(INV_SHEET)   + '?key=' + key).then(function(r){ return r.json(); }),
    fetch(base + encodeURIComponent(STATS_SHEET) + '?key=' + key).then(function(r){ return r.json(); }),
    fetch(base + encodeURIComponent('Config')    + '?key=' + key).then(function(r){ return r.json(); }).catch(function(){ return {values:[]}; })
  ]).then(function(results) {
    parseStats(results[1]);
    parseInventory(results[0]);
    parseConfig(results[2]);
    populateFilters();
    populateSidebar();
    document.getElementById('grid').innerHTML = '<p class="loading-msg">Choose a category to start browsing.</p>';
  }).catch(function(err) {
    document.getElementById('grid').innerHTML = '<p class="error-msg">Failed to load shop data.<br>'+err.message+'</p>';
  });
}

function parseConfig(data) {
  if (!data || !data.values) return;
  var config = {};
  data.values.forEach(function(row) {
    if (row[0] && row[1] !== undefined) config[String(row[0]).trim()] = String(row[1]).trim();
  });
  var title = document.getElementById('landingTitle');
  var subtitle = document.getElementById('landingSubtitle');
  var welcome = document.getElementById('welcomeText');
  var welcomeBox = document.getElementById('welcomeBox');
  if (title) { title.textContent = config['landing_title'] || 'UK Solo Ark Shop'; title.style.opacity='1'; }
  if (subtitle) { subtitle.textContent = config['landing_subtitle'] || 'Server 5977 — Choose a category to browse'; subtitle.style.opacity='1'; }
  if (welcome && welcomeBox) {
    welcome.textContent = config['welcome_text'] || '';
    welcomeBox.style.display = welcome.textContent ? '' : 'none';
    welcomeBox.style.opacity = '1';
  }
}

// sigMap built during parseStats — statsTag → signature string from cols C,D,E,F,I,J
var sigMap = {};

function parseInventory(data) {
  if (!data.values || data.values.length < 2) return;
  var rows    = data.values;
  var headers = rows[0].map(function(h){ return String(h).trim(); });

  // Build all data rows (skip blanks)
  var allRows = [];
  for (var i = 1; i < rows.length; i++) {
    var row     = rows[i];
    var isEmpty = row.every(function(c){ return !c || String(c).trim() === ''; });
    if (isEmpty) continue;
    var obj = {};
    headers.forEach(function(h,k){ if(h) obj[h] = row[k] !== undefined ? row[k] : ''; });
    // Simulate stock colours from text (Sheets API has no background data)
    var invText = String(obj[COL.inventory] || '').trim().toLowerCase();
    obj._inventoryText = String(obj[COL.inventory] || '').trim();
    if      (invText === 'in stock')   obj._inventoryHex = '#1e9e4e';
    else if (invText === 'low stock')  obj._inventoryHex = '#4a3a00';
    else if (invText === 'no stock' || invText === 'shop closed') obj._inventoryHex = '#7a1a1a';
    else                               obj._inventoryHex = '#ffffff';
    obj._variantHex = '#ffffff';
    obj._creatureBg = '#ffffff';
    obj._creatureFg = '#ffffff';
    allRows.push(obj);
  }

  // Group by creature name + stat signature (cols C,D,E,F,I,J from Stats sheet)
  var groupMap   = {};
  var groupOrder = [];
  var noSigCount = 0;
  allRows.forEach(function(obj) {
    var creature = String(obj[COL.creature] || '').trim();
    var tag      = String(obj[COL.statsTag] || '').trim();
    var sig;
    if (tag && sigMap[tag]) {
      sig = sigMap[tag];
    } else {
      // No matching stat signature — give each row its own unique group
      sig = '___no_sig_' + (noSigCount++) + '___';
    }
    var key = creature.toLowerCase() + '|||' + sig;
    if (!groupMap[key]) { groupMap[key] = []; groupOrder.push(key); }
    groupMap[key].push(obj);
  });

  allGroups = groupOrder.map(function(k){ return groupMap[k]; });
}

function parseStats(data) {
  statsMap = {};
  sigMap   = {};
  if (!data.values || data.values.length < 2) return;
  var rows     = data.values;
  var rawHdrs  = rows[0].map(function(h){ return String(h).trim(); });
  var infoIdx  = rawHdrs.indexOf('Stats Tag');
  if (infoIdx < 0) infoIdx = rawHdrs.indexOf('Info');
  if (infoIdx < 0) infoIdx = 1; // col B fallback
  var levelIIdx = rawHdrs.indexOf('Level_i');
  var cIdxMap = {};
  COLOUR_ID_COLS.forEach(function(key){ cIdxMap[key] = rawHdrs.indexOf(key); });

  var seen = {}, tiles = [];
  rawHdrs.forEach(function(h, idx) {
    if (!h || h==='Info' || h==='Stats Tag' || h.indexOf('_')!==-1 || COLOUR_ID_COLS.indexOf(h)!==-1) return;
    if (!seen.hasOwnProperty(h)) { seen[h]=tiles.length; tiles.push({label:h,firstIdx:idx,secondIdx:-1}); }
    else tiles[seen[h]].secondIdx = idx;
  });

  // Cols C,D,E,F,I,J = indices 2,3,4,5,8,9
  var sigCols = [2,3,4,5,8,9];

  for (var j = 1; j < rows.length; j++) {
    var sRow   = rows[j];
    var tagKey = String(sRow[infoIdx]||'').trim();
    if (!tagKey) continue;

    // Build stat signature for grouping
    var sig = sigCols.map(function(c){
      return sRow[c] !== undefined && sRow[c] !== null ? String(sRow[c]).trim() : '';
    }).join('|');
    sigMap[tagKey] = sig;

    var levelI = (levelIIdx>=0 && sRow[levelIIdx]!==undefined && sRow[levelIIdx]!=='') ? String(sRow[levelIIdx]).trim() : null;
    var colourIds = {};
    COLOUR_ID_COLS.forEach(function(key){
      var idx = cIdxMap[key];
      colourIds[key] = (idx>=0 && sRow[idx]!==undefined && sRow[idx]!=='') ? String(sRow[idx]).trim() : '-';
    });
    var rowTiles = tiles.map(function(tile){
      var v1 = String(sRow[tile.firstIdx]==null?'':sRow[tile.firstIdx]).trim()||'-';
      var v2 = tile.secondIdx>=0 ? String(sRow[tile.secondIdx]==null?'':sRow[tile.secondIdx]).trim()||'-' : null;
      return {label:tile.label,v1:v1,v2:v2};
    });
    statsMap[tagKey] = {tiles:rowTiles,levelI:levelI,colourIds:colourIds};
  }
}


// ── NAVIGATION ────────────────────────────────────────────────
function enterShop(type) {
  activeType = type;
  document.body.classList.add('in-shop');
  var tf = document.getElementById('typeFilter');
  if (tf) {
    tf.value = type;
    // If value didn't set (option not yet populated), retry after filters load
    if (type && tf.value !== type) {
      var trySet = setInterval(function(){
        tf.value = type;
        if (tf.value === type) { clearInterval(trySet); applyFilters(); }
      }, 100);
      setTimeout(function(){ clearInterval(trySet); }, 3000);

  }
  if (allGroups.length) applyFilters();
  else document.getElementById('grid').innerHTML = '<p class="loading-msg">Loading creatures...</p>';

}

// ── FILTERS ───────────────────────────────────────────────────
function populateFilters() {
  var names=[], types=[], varKeywords=[];
  allGroups.forEach(function(g){ g.forEach(function(r){
    var n=String(r[COL.creature]||'').trim(), t=String(r[COL.type]||'').trim(), v=String(r[COL.variant]||'').trim();
    if(n&&names.indexOf(n)===-1) names.push(n);
    if(t&&types.indexOf(t)===-1) types.push(t);
    if(v){
      var parts=v.split(' - ');
      parts.forEach(function(part){
        var kw=part.replace(/_/g,' ').trim();
        if(!kw) return;
        if(/^\d+$/.test(kw)) return; // skip pure numbers
        kw=kw.replace(/\s+\d+$/, '').trim();  // strip trailing number e.g. "Event 2"→"Event"
        kw=kw.replace(/^\d+\s+/, '').trim();  // strip leading number e.g. "192 Event"→"Event"
        kw=kw.replace(/-ish$/i, '').trim();   // strip -ish suffix e.g. "Deadpool-ish"→"Deadpool"
        if(!kw) return;
        if(varKeywords.indexOf(kw)===-1) varKeywords.push(kw);
      });
    }
  }); });
  names.sort(); types.sort(); varKeywords.sort();
  var cf=document.getElementById('creatureFilter'), tf=document.getElementById('typeFilter'), vf=document.getElementById('variantFilter');
  names.forEach(function(n){ var o=document.createElement('option'); o.value=n; o.textContent=n; cf.appendChild(o); });
  types.forEach(function(t){ var o=document.createElement('option'); o.value=t; o.textContent=t; tf.appendChild(o); });
  varKeywords.forEach(function(k){ var o=document.createElement('option'); o.value=k; o.textContent=k; vf.appendChild(o); });
  // Re-apply activeType after dropdown is populated
  if(activeType && tf) tf.value=activeType;
}

function getFiltered() {
  var q=document.getElementById('search').value.toLowerCase();
  var fc=document.getElementById('creatureFilter').value.toLowerCase();
  var ft=document.getElementById('typeFilter').value.toLowerCase();
  var fv=document.getElementById('variantFilter').value.toLowerCase();
  var fs=document.getElementById('stockFilter')?document.getElementById('stockFilter').value.toLowerCase():'';
  return allGroups.filter(function(g){
    return g.some(function(r){
      var nm=String(r[COL.creature]||'').toLowerCase(), tp=String(r[COL.type]||'').toLowerCase();
      var vr=String(r[COL.variant]||'').toLowerCase().replace(/_/g,' ').replace(/-ish\b/g,''), inf=String(r[COL.info]||'').toLowerCase();
      var tag=String(r[COL.statsTag]||'').toLowerCase();
      var inv=String(r._inventoryText||'').toLowerCase();
      var stockMatch=!fs||(fs==='in stock'&&inv==='in stock')||(fs==='low stock'&&inv==='low stock')||(fs==='no stock'&&(inv==='no stock'||inv==='shop closed'||inv===''));
      return(!q||nm.includes(q)||inf.includes(q)||tag.includes(q)||vr.includes(q))&&(!fc||nm===fc)&&(!ft||tp===ft)&&(!fv||vr.includes(fv))&&stockMatch;
    });
  });
}

function applyFilters() {
  var filtered=getFiltered();
  var grid=document.getElementById('grid');
  document.getElementById('count').textContent=filtered.length+' creature'+(filtered.length!==1?'s':'');
  if(!filtered.length){ grid.innerHTML="<p class='empty'>No creatures match.</p>"; return; }
  var ft=document.getElementById('typeFilter').value;
  var fc=document.getElementById('creatureFilter').value;
  var fq=document.getElementById('search').value;
  var fs=document.getElementById('stockFilter')?document.getElementById('stockFilter').value:'';
  if(ft||fc||fq||fs){
    // When filtering: sort by level descending
    filtered=filtered.slice().sort(function(a,b){
      var levelA=0,levelB=0;
      a.forEach(function(r){ var s=statsMap[String(r[COL.statsTag]||'').trim()]; if(s&&s.levelI) levelA=Math.max(levelA,Number(s.levelI)+1); });
      b.forEach(function(r){ var s=statsMap[String(r[COL.statsTag]||'').trim()]; if(s&&s.levelI) levelB=Math.max(levelB,Number(s.levelI)+1); });
      return levelB-levelA;
    });
  } else {
    // Default: New In first, then alphabetical by creature name
    filtered=filtered.slice().sort(function(a,b){
      var typeA=String(a[0][COL.type]||'').trim().toLowerCase();
      var typeB=String(b[0][COL.type]||'').trim().toLowerCase();
      var aNew=typeA==='new in'?0:1;
      var bNew=typeB==='new in'?0:1;
      if(aNew!==bNew) return aNew-bNew;
      var nameA=String(a[0][COL.creature]||'').trim().toLowerCase();
      var nameB=String(b[0][COL.creature]||'').trim().toLowerCase();
      return nameA<nameB?-1:nameA>nameB?1:0;
    });
  }
  grid.innerHTML='';
  var fv=document.getElementById('variantFilter').value.toLowerCase();
  filtered.forEach(function(group,gi){
    var card=document.createElement('div');
    card.className='card'; card.dataset.gi=gi; card.dataset.group=JSON.stringify(group);
    var startSi=0;
    var ftLower=(document.getElementById('typeFilter').value||'').toLowerCase();
    if(fv){ for(var vi=0;vi<group.length;vi++){ if(String(group[vi][COL.variant]||'').toLowerCase().includes(fv)){ startSi=vi; break; } } }
    if(ftLower&&startSi===0){
      for(var vi=0;vi<group.length;vi++){
        var vst=String(group[vi][COL.shopTag]||'').toLowerCase();
        var vtp=String(group[vi][COL.type]||'').toLowerCase();
        if(vst===ftLower||vtp===ftLower||vtp.indexOf(ftLower)!==-1){ startSi=vi; break; }
      }
    }
    card.innerHTML=buildCardHTML(group,startSi);
    wireCardImages(card);
    (function(capturedGi){ card.addEventListener('click',function(e){
      if(!('ontouchstart' in window)&&navigator.maxTouchPoints===0) return;
      if(e.target.closest('button,select,input,textarea,label')) return;
      openOverlay(capturedGi);
    }); })(gi);
    grid.appendChild(card);
  });
}

// ── SIDEBAR ───────────────────────────────────────────────────
var sidebarViewAlpha = false;

function toggleSidebarView() {
  sidebarViewAlpha = !sidebarViewAlpha;
  var btn = document.getElementById('sidebarViewToggle');
  if(btn) btn.textContent = sidebarViewAlpha ? 'Type' : 'A→Z';
  if(sidebarViewAlpha) populateSidebarAlpha();
  else populateSidebar();
}

function populateSidebarAlpha() {
  var items = document.getElementById('sidebarItems');
  if(!items) return;
  items.innerHTML = '';
  var allItem = document.createElement('div');
  allItem.className = 'sidebar-item active'; allItem.textContent = 'All Creatures';
  allItem.onclick = function(){ sidebarFilter('','',allItem); };
  items.appendChild(allItem);
  var names = [];
  allGroups.forEach(function(g){
    var n = String(g[0][COL.creature]||'').trim();
    if(n && names.indexOf(n) === -1) names.push(n);
  });
  names.sort().forEach(function(n){
    var el = document.createElement('div');
    el.className = 'sidebar-item'; el.textContent = n;
    el.onclick = (function(name, elem){ return function(){ sidebarFilter(name,'',elem); }; })(n, el);
    items.appendChild(el);
  });
}

function populateSidebar() {
  var items=document.getElementById('sidebarItems');
  if(!items) return;
  items.innerHTML='';
  var allItem=document.createElement('div');
  allItem.className='sidebar-item active'; allItem.textContent='All Creatures';
  allItem.onclick=function(){ sidebarFilter('','',allItem); };
  items.appendChild(allItem);
  var typeMap={}, untyped=[];
  allGroups.forEach(function(g){
    var n=String(g[0][COL.creature]||'').trim(), t=String(g[0][COL.type]||'').trim();
    if(!n) return;
    if(t){ if(!typeMap[t]) typeMap[t]=[]; if(typeMap[t].indexOf(n)===-1) typeMap[t].push(n); }
    else { if(untyped.indexOf(n)===-1) untyped.push(n); }
  });
  function renderTypeSection(type,names){
    var typeEl=document.createElement('div');
    typeEl.className='sidebar-type';
    typeEl.innerHTML='<span>'+type+'</span><span class="sidebar-arrow">&#9660;</span>';
    var collapsed=false;
    typeEl.onclick=(function(t,el){ return function(){
      collapsed=!collapsed; el.classList.toggle('collapsed',collapsed);
      var next=el.nextSibling;
      while(next&&next.classList&&next.classList.contains('sidebar-child')){ next.classList.toggle('hidden',collapsed); next=next.nextSibling; }
      if(!collapsed) sidebarFilter('',t,el);
    }; })(type,typeEl);
    items.appendChild(typeEl);
    names.sort().forEach(function(n){
      var el=document.createElement('div');
      el.className='sidebar-item sidebar-child'; el.textContent=n;
      el.onclick=(function(name,elem){ return function(e){ e.stopPropagation(); sidebarFilter(name,'',elem); }; })(n,el);
      items.appendChild(el);
    });
  }
  Object.keys(typeMap).sort().forEach(function(t){ renderTypeSection(t,typeMap[t]); });
  if(untyped.length) renderTypeSection('Other',untyped);
}

function sidebarFilter(name,type,el){
  var cf=document.getElementById('creatureFilter'), tf=document.getElementById('typeFilter');
  if(cf) cf.value=name; if(tf) tf.value=type;
  applyFilters();
  document.querySelectorAll('.sidebar-item,.sidebar-type').forEach(function(i){ i.classList.remove('active'); });
  if(el) el.classList.add('active');
  if(window.innerWidth<=768) document.getElementById('sidebar').classList.remove('open');
}

// ── HELPERS ───────────────────────────────────────────────────
function isReddish(h){ if(!h||h==='#ffffff'||h==='white') return false; var c=h.replace('#',''); if(c.length===3)c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2]; var r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16); return r>150&&r>g*1.4&&r>b*1.4; }
function isGreenish(h){ if(!h||h==='#ffffff'||h==='white') return false; var c=h.replace('#',''); if(c.length===3)c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2]; var r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16); return g>r&&g>b&&g>80; }
function isYellowish(h){ if(!h||h==='#ffffff'||h==='white') return false; var c=h.replace('#',''); if(c.length===3)c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2]; var r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16); return r>150&&g>100&&b<100&&r>b&&g>b; }
function isDefaultHex(h){ return !h||h==='#ffffff'||h==='white'||h==='rgb(255,255,255)'; }
function driveUrl(raw){ if(!raw) return null; var m=raw.match(/\/d\/([a-zA-Z0-9_-]+)/)||raw.match(/id=([a-zA-Z0-9_-]+)/); return m?'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w400':null; }

function buildInvBadge(invHex, invText) {
  var tl=(invText||'').toLowerCase();
  if(tl==='in stock')         return "<span class='inv-badge' style='background:#1e9e4e;color:#fff'>"+invText+"</span>";
  else if(tl==='low stock')   return "<span class='inv-badge' style='background:#e07800;color:#fff'>"+invText+"</span>";
  else if(tl==='no stock')    return "<span class='inv-badge' style='background:#e94560;color:#fff'>"+invText+"</span>";
  else if(tl==='shop closed') return "<span class='inv-badge' style='background:#e94560;color:#fff'>"+invText+"</span>";
  else if(invText)            return "<span class='inv-badge' style='background:#444;color:#aaa'>"+invText+"</span>";
  else                        return '';
}

// ── BUILD CARD ────────────────────────────────────────────────
function buildCardHTML(group, si) {
  var r=group[si]||group[0];
  var name=String(r[COL.creature]||'Unknown').trim();
  var variant=String(r[COL.variant]||'').trim();
  var invHex=String(r._inventoryHex||'#ffffff'), invText=String(r._inventoryText||'').trim();
  var tagKey=String(r[COL.statsTag]||'').trim();
  var statsEntry=statsMap[tagKey]||null;
  var levelRaw=statsEntry&&statsEntry.levelI?Number(statsEntry.levelI):null;
  var level=levelRaw!==null?(levelRaw+1):'?';
  var isItem=variant.indexOf('Item -')===0;
  var amtAvail=Number(r[COL.amountAvailable]||0)||0;
  var invTL=invText.toLowerCase(); var noStock=invTL==='no stock'||invTL==='shop closed'||(invText===''&&!isGreenish(invHex));
  var typeValLC=String(r[COL.type]||'').toLowerCase();
  var isNewIn=typeValLC==='new in'||typeValLC.indexOf('new in')!==-1;
  // New In: if in stock or low stock = active button; if no stock = show "New In Shop" disabled
  if(isNewIn&&!noStock) noStock=false; // explicitly allow
  if(isNewIn&&noStock) noStock=true;   // explicitly block
  var isSingleClone=typeValLC.indexOf('single clone')!==-1;
  var nameStyle='';
  var resMult=isItem?1:isSingleClone?1:2;
  var invBadge=buildInvBadge(invHex,invText);

  // Variant bar
  var varOpts=group.map(function(v,i){
    var rawLabel=String(v[COL.variant]||'No variant');
    var vLabel=rawLabel.replace(/^aberrant\s*[-–—]\s*/i,'').trim()||rawLabel;
    var selAttr=i===si?' selected':'';
    return '<option value="'+i+'"'+selAttr+'>'+vLabel+'</option>';
  }).join('');
  var variantBarHtml='';
  if(group.length>1){
    variantBarHtml="<div class='sel-bar variant'><label>Current Variants Available: <span class='var-count'>"+group.length+"</span></label><select onchange='switchVariant(this)'>"+varOpts+"</select></div>";
  } else {
    var rawSingle=String(group[0][COL.variant]||'').trim();
    var singleVariant=rawSingle.replace(/^aberrant\s*[-–—]\s*/i,'').trim()||rawSingle;
    if(singleVariant) variantBarHtml="<div class='sel-bar variant'><label>Current Variants Available: <span class='var-count'>1</span></label><div style='padding:6px 10px;font-size:13px'>"+singleVariant+"</div></div>";
  }

  // Resources
  var resHtml=RESOURCES.map(function(rc){
    var rawVal=parseFloat(String(r[rc.key]||r[COL[rc.key]]||'0').replace(/[^0-9.]/g,''))||0;
    var display=rawVal===0?'-':String(rawVal*resMult);
    var cls=rawVal>0?' hv':'';
    return "<div class='res-item'><div class='res-label'>"+rc.label+"</div><div class='res-value"+cls+"' data-raw='"+rawVal+"'>"+display+"</div></div>";
  }).join('');

  // Colour IDs
  var cidHtml='';
  if(statsEntry&&statsEntry.colourIds){
    var cids=statsEntry.colourIds;
    var cidGrid=COLOUR_ID_COLS.map(function(key,i){ return "<div class='cid-item'><div class='cid-label'>C"+i+"</div><div class='cid-value'>"+(cids[key]||'-')+"</div></div>"; }).join('');
    cidHtml="<div class='colour-id-bar'><label>Colour IDs</label><div class='colour-id-grid'>"+cidGrid+"</div></div>";
  }

  // Stats
  var statsHtml='';
  if(statsEntry&&statsEntry.tiles&&statsEntry.tiles.length){
    var tileHtml=statsEntry.tiles.map(function(tile){
      var v1=tile.v1||'-';
      if(tile.v2!==null&&tile.v2!==undefined){
        var v2raw=tile.v2||'-';
        var v2=tile.label==='Damage'&&v2raw!=='-'?(Math.round(parseFloat(v2raw)*100)+'%'):v2raw;
        return "<div class='stat-item'><div class='stat-header'><span class='stat-name'>"+tile.label+"</span><span class='stat-hsep'>:</span><span class='stat-v1'>"+v1+"</span></div><div class='stat-value-row'>Value: <span class='stat-val'>"+v2+"</span></div></div>";
      }
      return "<div class='stat-item'><div class='stat-header'><span class='stat-name'>"+tile.label+"</span></div><div class='stat-value-row'>Value: <span class='stat-val'>"+v1+"</span></div></div>";
    }).join('');
    statsHtml="<div class='section-title'>Stats</div><div class='stats-grid'>"+tileHtml+"</div>";
  }

  // Image
  var manualUrl=driveUrl(String(r[COL.imageUrl]||'').trim());
  var imgContent=manualUrl?"<img src='"+manualUrl+"' alt='"+name+"'>":"<div class='img-placeholder'><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.5'><path d='M4 16l4-4 4 4 4-6 4 6'/><rect x='2' y='4' width='20' height='16' rx='2'/></svg>No image</div>";
  var imgDiv="<div class='card-img'>"+imgContent+"</div>";

  // Assemble
  var parts=[];
  parts.push("<div class='card-header'><span class='level-badge'>"+(isItem?'Item':'Lvl '+level)+"</span><div class='card-name' style='"+nameStyle+"'>"+name+"</div>"+invBadge+"</div>");
  parts.push(imgDiv);
  if(variantBarHtml) parts.push(variantBarHtml);
  var infoText=String(r[COL.info]||'').trim();
  if(infoText) parts.push("<div class='info-bar'><div class='info-text'>"+infoText+"</div></div>");
  if(statsHtml) parts.push(statsHtml);
  if(cidHtml) parts.push(cidHtml);
  parts.push("<div class='card-body'><div class='section-title'>Resources</div><div class='res-grid'>"+resHtml+"</div></div>");
  var typeVal=String(r[COL.type]||'').toLowerCase();
  var isSingleClone=typeVal.indexOf('single clone')!==-1;
  var genderBar;
  if(isSingleClone){
    var scOpts='<option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>';
    genderBar="<div class='sel-bar gender'><label>Quantity</label><select class='gender-sel' onchange='onGenderChange(this)'>"+scOpts+"</select></div>";
  } else {
    genderBar="<div class='sel-bar gender' style='"+(isItem?'display:none':'')+"'><label>Single or Pairs?</label><select class='gender-sel' onchange='onGenderChange(this)'><option>Male</option><option>Female</option><option selected>Pair x2</option><option>Pair x2 +1 Female</option></select></div>";
  }
  parts.push(genderBar);
  if(isItem){
    var qtyOpts=Array.from({length:amtAvail},function(_,idx){ return "<option value='"+(idx+1)+"'>"+(idx+1)+"</option>"; }).join('');
    parts.push("<div class='sel-bar qty'><label>Quantity</label><select class='qty-sel' onchange='onQtyChange(this)'>"+(qtyOpts||'<option>0</option>')+"</select></div>");
  }
  var btnText=noStock?(isNewIn?'New In Shop':invText==='Shop Closed'?'Shop Closed':'No Stock'):'Add to Basket';
  parts.push("<button class='add-btn"+(noStock?' no-stock':'')+"'"+(noStock?'':' onclick="addToBasket(this)"')+">"+btnText+"</button>");
  return parts.join('');
}

function wireCardImages(card) {
  card.querySelectorAll('.card-img img').forEach(function(img){
    img.addEventListener('load',function(){ img.classList.add('loaded'); });
    img.addEventListener('error',function(){ img.classList.add('errored'); var ph=img.parentElement.querySelector('.img-placeholder'); if(ph) ph.style.display='flex'; });
    if(img.complete&&img.naturalWidth>0) img.classList.add('loaded');
  });
}

function switchVariant(sel){
  var card=sel.closest('.card');
  var group=JSON.parse(card.dataset.group);
  updateCardSections(card,group,Number(sel.value));
}

function updateCardSections(card,group,si){
  var r=group[si]||group[0];
  var invHex=String(r._inventoryHex||'#ffffff'), invText=String(r._inventoryText||'').trim();
  var invTL=invText.toLowerCase(); var noStock=invTL==='no stock'||invTL==='shop closed'||(invText===''&&!isGreenish(invHex));
  var typeValLC=String(r[COL.type]||'').toLowerCase();
  var isNewIn=typeValLC==='new in'||typeValLC.indexOf('new in')!==-1;
  // isNewIn only blocks basket when actually no stock
  var tagKey=String(r[COL.statsTag]||'').trim();
  var statsEntry=statsMap[tagKey]||null;
  var levelRaw=statsEntry&&statsEntry.levelI?Number(statsEntry.levelI):null;
  var level=levelRaw!==null?(levelRaw+1):'?';
  var variant=String(r[COL.variant]||'').trim();
  var isItem=variant.indexOf('Item -')===0;
  var amtAvail=Number(r[COL.amountAvailable]||0)||0;

  // Update header badge
  var hdr=card.querySelector('.card-header');
  if(hdr){ var eb=hdr.querySelector('.inv-badge'); if(eb) eb.outerHTML=buildInvBadge(invHex,invText); }
  var lvlEl=card.querySelector('.level-badge');
  if(lvlEl) lvlEl.textContent=isItem?'Item':('Lvl '+level);

  // Update add button
  var addBtn=card.querySelector('.add-btn');
  if(addBtn){
    if(noStock){ addBtn.classList.add('no-stock'); addBtn.textContent='No Stock'; addBtn.onclick=null; }
    else { addBtn.classList.remove('no-stock'); addBtn.textContent='Add to Basket'; addBtn.onclick=function(){ addToBasket(addBtn); }; }
  }

  // Update info bar
  var infoText=String(r[COL.info]||'').trim();
  var infoBar=card.querySelector('.info-bar');
  if(infoBar){ infoBar.style.display=infoText?'':'none'; if(infoText){ var it=infoBar.querySelector('.info-text'); if(it) it.textContent=infoText; } }

  // Update resources
  var genSelU=card.querySelector('.gender-sel'), qtySelU=card.querySelector('.qty-sel');
  var resMult=1;
  var typeLC=String(r[COL.type]||'').toLowerCase();
  var isSC=typeLC.indexOf('single clone')!==-1;
  if(isItem){ resMult=qtySelU?Number(qtySelU.value)||1:1; }
  else if(isSC){ resMult=genSelU?Number(genSelU.value)||1:1; }
  else { var gv=genSelU?genSelU.value:''; resMult=gv==='Pair x2'?2:gv==='Pair x2 +1 Female'?3:1; }
  // Update data-raw from new variant's values AND refresh display
  var resEls=card.querySelectorAll('.res-value[data-raw]');
  RESOURCES.forEach(function(rc,idx){
    var rawVal=parseFloat(String(r[COL[rc.key]]||r[rc.key]||'0').replace(/[^0-9.]/g,''))||0;
    if(resEls[idx]){
      resEls[idx].dataset.raw=rawVal;
      resEls[idx].textContent=rawVal===0?'-':String(rawVal*resMult);
    }
  });

  // Update image
  var manualUrl=driveUrl(String(r[COL.imageUrl]||'').trim());
  var imgEl=card.querySelector('.card-img img');
  if(imgEl){
    imgEl.classList.remove('loaded','errored');
    if(manualUrl){ imgEl.src=manualUrl; imgEl.alt=String(r[COL.creature]||''); }
    else { imgEl.src=''; imgEl.classList.add('errored'); }
  }

  // Update colour IDs
  if(statsEntry&&statsEntry.colourIds){
    var cidBar=card.querySelector('.colour-id-bar');
    if(cidBar){
      var cidGrid=cidBar.querySelector('.colour-id-grid');
      if(cidGrid){ cidGrid.innerHTML=COLOUR_ID_COLS.map(function(key,i){ return "<div class='cid-item'><div class='cid-label'>C"+i+"</div><div class='cid-value'>"+(statsEntry.colourIds[key]||'-')+"</div></div>"; }).join(''); }
    }
  }
}

function updateResources(card,mult){
  card.querySelectorAll('.res-value[data-raw]').forEach(function(el){
    var raw=parseFloat(el.dataset.raw)||0;
    el.textContent=raw===0?'-':String(raw*mult);
  });
}

function onGenderChange(sel){
  var card=sel.closest('.card');
  var btn=card.querySelector('.add-btn');
  var isSC=!isNaN(Number(sel.value))&&Number(sel.value)>0;
  var mult=isSC?Number(sel.value):sel.value==='Pair x2'?2:sel.value==='Pair x2 +1 Female'?3:1;
  var full=slotsUsed()+mult>BASKET_LIMIT;
  if(!btn.classList.contains('no-stock')){ btn.disabled=full; btn.textContent=full?'Basket Full':'Add to Basket'; }
  updateResources(card,mult);
}

function onQtyChange(sel){
  var card=sel.closest('.card');
  var qty=Number(sel.value)||1;
  updateResources(card,qty);
}

// ── BASKET ────────────────────────────────────────────────────
function slotsUsed(){ return basket.reduce(function(t,i){ return t+(Number(i.slots)||1); },0); }
function updateCount(){
  var used=slotsUsed();
  document.getElementById('basketCount').textContent=used+'/'+BASKET_LIMIT;
  var obc=document.getElementById('overlayBasketCount'); if(obc) obc.textContent=basket.length;
  document.getElementById('basketSlots').textContent=slotsUsed()+' / '+BASKET_LIMIT+' slots used';
}

function showToast(msg){
  var t=document.getElementById('toast');
  if(!t) return;
  t.textContent=msg||'Added to Basket!';
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

function addToBasket(btn){
  var card=btn.closest('.card');
  var group=JSON.parse(card.dataset.group);
  var varSel=card.querySelector('.sel-bar.variant select');
  var si=varSel?Number(varSel.value):0;
  var r=group[si]||group[0];
  var tagKey=String(r[COL.statsTag]||'').trim();
  var statsEntry=statsMap[tagKey]||null;
  var levelRaw=statsEntry&&statsEntry.levelI?Number(statsEntry.levelI):null;
  var level=levelRaw!==null?(levelRaw+1):'?';
  var name=String(r[COL.creature]||'Unknown').trim();
  var variant=String(r[COL.variant]||'').trim().replace(/^aberrant\s*[-–—]\s*/i,'');
  var isItem=variant.indexOf('Item -')===0;
  var genSel=card.querySelector('.gender-sel');
  var qtySel=card.querySelector('.qty-sel');
  var gender='Pair x2', needed=2;
  if(isItem){ gender='Item'; needed=qtySel?Number(qtySel.value)||1:1; }
  else { gender=genSel?genSel.value:'Pair x2'; var scQty=!isNaN(Number(gender))&&Number(gender)>0; needed=scQty?Number(gender):gender==='Pair x2'?2:gender==='Pair x2 +1 Female'?3:1; }
  if(slotsUsed()+needed>BASKET_LIMIT){ alert('Basket full — max '+BASKET_LIMIT+' creatures.'); return; }
  var item={creature:name,level:level,variant:variant,gender:gender,slots:needed,imageUrl:String(r[COL.imageUrl]||'').trim(),type:String(r[COL.type]||'').trim()};
  var rawTekVal=parseFloat(String(r[COL.tek]||r['Tek']||r['tek']||'0').replace(/[^0-9.]/g,''))||0;
  console.log('addToBasket tek debug:', r[COL.tek], r['Tek'], 'rawTekVal:', rawTekVal, 'gender:', gender);
  item._rawTek=rawTekVal;
  var isTribeBasket=document.getElementById('tribeCheck')&&document.getElementById('tribeCheck').checked;
  var tribeMult=isTribeBasket?(2/3):1;
  RESOURCES.forEach(function(rc){
    var raw=parseFloat(String(r[COL[rc.key]]||r[rc.key]||'0').replace(/[^0-9.]/g,''))||0;
    if(!isItem){
      var scQ=!isNaN(Number(gender))&&Number(gender)>0;
      if(rc.key==='tek'&&!scQ){
        // Use sheet raw tek value * gender multiplier * tribe discount
        var tekPerCreature=raw;
        var isNIAdd=tekPerCreature===250;
        var isLLAdd=tekPerCreature===50;
        if(isNIAdd){
          if(gender==='Male'||gender==='Female') item[rc.key]=isTribeBasket?200:250;
          else if(gender==='Pair x2') item[rc.key]=isTribeBasket?400:500;
          else if(gender==='Pair x2 +1 Female') item[rc.key]=isTribeBasket?600:750;
          else item[rc.key]=Math.round(tekPerCreature*needed*(isTribeBasket?0.8:1));
        } else if(isLLAdd){
          if(gender==='Male'||gender==='Female') item[rc.key]=50;
          else if(gender==='Pair x2') item[rc.key]=100;
          else if(gender==='Pair x2 +1 Female') item[rc.key]=150;
          else item[rc.key]=50*needed;
        } else if(tekPerCreature===200){
          if(gender==='Male'||gender==='Female') item[rc.key]=isTribeBasket?150:200;
          else if(gender==='Pair x2') item[rc.key]=isTribeBasket?300:400;
          else if(gender==='Pair x2 +1 Female') item[rc.key]=isTribeBasket?450:600;
          else item[rc.key]=Math.round(tekPerCreature*needed*(isTribeBasket?0.75:1));
        } else {
          if(gender==='Male'||gender==='Female') item[rc.key]=Math.round(tekPerCreature*tribeMult);
          else if(gender==='Pair x2') item[rc.key]=Math.round(tekPerCreature*2*tribeMult);
          else if(gender==='Pair x2 +1 Female') item[rc.key]=Math.round(tekPerCreature*3*tribeMult);
          else item[rc.key]=Math.round(raw*needed*tribeMult);
        }
      } else {
        item[rc.key]=isTribeBasket?Math.round(raw*needed*(2/3)):raw*needed;
      }
    } else {
      item[rc.key]=raw*needed;
    }
  });
  basket.push(item); 
  console.log('basket item tek:', item.tek, '_rawTek:', item._rawTek, 'gender:', item.gender);
  updateCount(); renderBasket(); rebuildPaymentDropdown(); showToast(name+' added to Basket!');
}

function removeItem(i){ basket.splice(i,1); updateCount(); renderBasket(); rebuildPaymentDropdown(); }

function renderBasket(){
  var el=document.getElementById('basketItems');
  if(!basket.length){ el.innerHTML="<p class='basket-empty'>Your basket is empty.</p>"; return; }
  el.innerHTML=basket.map(function(it,i){
    return "<div class='basket-item'><button class='bi-remove' onclick='removeItem("+i+")'>&#x2715;</button>"
      +"<div class='bi-name'>"+it.creature+"</div>"
      +"<div class='bi-detail'>Lvl "+it.level+" · "+it.variant+" · "+it.gender+"</div>"
      +"</div>";
  }).join('');
}

function rebuildPaymentDropdown(){
  var payRow=document.getElementById('paymentRow'), sumRow=document.getElementById('orderSummary'), sel=document.getElementById('paymentSelect');
  if(!basket.length){ payRow.style.display='none'; sumRow.style.display='none'; return; }
  var prev=sel.value; sel.innerHTML='';
  var avail=RESOURCES.filter(function(rc){ return basket.some(function(it){ return (it[rc.key]||0)>0; }); });
  avail.forEach(function(rc){ var o=document.createElement('option'); o.value=rc.key; o.textContent=rc.label; sel.appendChild(o); });
  if(prev&&avail.some(function(rc){ return rc.key===prev; })) sel.value=prev;
  else if(avail.some(function(rc){ return rc.key==='tek'; })) sel.value='tek';
  payRow.style.display=avail.length?'flex':'none';
  renderSummary();
}

function renderSummary(){
  var sumRow=document.getElementById('orderSummary'), sel=document.getElementById('paymentSelect');
  if(!basket.length||!sel.value){ sumRow.style.display='none'; return; }
  var key=sel.value, label=sel.options[sel.selectedIndex]?sel.options[sel.selectedIndex].textContent:key;
  var isTribe=document.getElementById('tribeCheck')&&document.getElementById('tribeCheck').checked;
  function liveTek(it){
    var g=it.gender;
    var base=it._rawTek||150;
    var isNI=base===250; // New In pricing
    var isLL=base===50;  // Lower Lvl pricing
    if(isNI){
      if(!isNaN(Number(g))&&Number(g)>0) return Math.round(base*Number(g)*(isTribe?0.8:1));
      if(g==='Male'||g==='Female') return isTribe?200:250;
      if(g==='Pair x2') return isTribe?400:500;
      if(g==='Pair x2 +1 Female') return isTribe?600:750;
      return it.tek||0;
    }
    if(isLL){
      if(!isNaN(Number(g))&&Number(g)>0) return Math.round(50*Number(g));
      if(g==='Male'||g==='Female') return 50;
      if(g==='Pair x2') return 100;
      if(g==='Pair x2 +1 Female') return 150;
      return it.tek||0;
    }
    var is200=base===200;
    if(is200){
      if(!isNaN(Number(g))&&Number(g)>0) return Math.round(200*Number(g)*(isTribe?0.75:1));
      if(g==='Male'||g==='Female') return isTribe?150:200;
      if(g==='Pair x2') return isTribe?300:400;
      if(g==='Pair x2 +1 Female') return isTribe?450:600;
      return it.tek||0;
    }
    var mult=isTribe?(2/3):1;
    if(!isNaN(Number(g))&&Number(g)>0) return Math.round(base*Number(g)*mult);
    if(g==='Male'||g==='Female') return Math.round(base*mult);
    if(g==='Pair x2') return Math.round(base*2*mult);
    if(g==='Pair x2 +1 Female') return Math.round(base*3*mult);
    return it.tek||0;
  }
  function liveVal(it){
    if(key!=='tek'){ var tk=it.tek||0; var ltk=liveTek(it); var r2=tk>0?ltk/tk:1; return Math.round((it[key]||0)*r2); }
    return liveTek(it);
  }
  var standardTek=isTribe?100:150;
  var pairCount=basket.filter(function(it){ return it.gender==='Pair x2'&&(it._rawTek||0)===150; }).length;
  var bundles=Math.floor(pairCount/3);
  var bundlePrice=isTribe?500:750;
  var singlePairPrice=isTribe?200:300;
  var tekTotal=basket.reduce(function(t,it){return t+liveTek(it);},0);
  var ratio=tekTotal>0?basket.reduce(function(t,it){return t+liveVal(it);},0)/tekTotal:1;
  var bundlePriceScaled=Math.round(bundlePrice*ratio);
  var singlePairScaled=Math.round(singlePairPrice*ratio);
  var pairIdxs=[];
  basket.forEach(function(it,i){ if(it.gender==='Pair x2'&&(it._rawTek||0)===150) pairIdxs.push(i); });
  var bundledIdxs=pairIdxs.slice(0,bundles*3);
  var summaryHtml='', total=0;
  basket.forEach(function(it,i){
    if(bundledIdxs.indexOf(i)!==-1) return;
    var v=it.gender==='Pair x2'&&(it._rawTek||0)===150?singlePairScaled:liveVal(it);
    total+=v;
    summaryHtml+="<div class='os-row'><span>"+it.creature+(it.variant?" ("+it.variant+")":"")+" · "+it.gender+"</span>";
    summaryHtml+="<span style='display:flex;align-items:center;gap:6px'>"+(v>0?v+' '+label:'—')+"<button onclick='removeItem("+i+")' style='background:#e94560;border:none;color:#fff;font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px;cursor:pointer'>&times;</button></span></div>";
  });
  for(var b=0;b<bundles;b++){
    var bIdxs=bundledIdxs.slice(b*3,(b+1)*3);
    summaryHtml+="<div class='os-row os-saving'><span style='font-weight:700'>Bundle "+(b+1)+" — 3 pairs for "+bundlePriceScaled+" "+label+":</span></div>";
    bIdxs.forEach(function(idx){
      var it=basket[idx];
      summaryHtml+="<div class='os-row' style='padding-left:14px'><span>"+it.creature+(it.variant?" ("+it.variant+")":"")+"</span>";
      summaryHtml+="<button onclick='removeItem("+idx+")' style='background:#e94560;border:none;color:#fff;font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px;cursor:pointer'>&times;</button></div>";
    });
    total+=bundlePriceScaled;
  }
  sumRow.innerHTML=summaryHtml+"<div class='os-row os-total'><span>Total</span><span>"+(total>0?total+' '+label:'—')+"</span></div>";
  sumRow.style.display='flex';
}

function openBasket(){ document.getElementById('basketOverlay').classList.add('open'); document.getElementById('basketPanel').classList.add('open'); }
function closeBasket(){ document.getElementById('basketOverlay').classList.remove('open'); document.getElementById('basketPanel').classList.remove('open'); }

// ── ORDER SUBMISSION (via GAS) ────────────────────────────────
function placeOrder(){
  var name=document.getElementById('custName').value.trim();
  var discord=document.getElementById('custDiscord').value.trim();
  var notes=document.getElementById('custNotes').value.trim();
  var sel=document.getElementById('paymentSelect');
  var msg=document.getElementById('formMsg');
  var isTribe=document.getElementById('tribeCheck').checked;
  var tribeName=isTribe?document.getElementById('tribeName').value.trim():'';
  if(!basket.length){ msg.className='form-msg err'; msg.textContent='Your basket is empty.'; return; }
  if(!name){ msg.className='form-msg err'; msg.textContent='Please enter your name.'; return; }
  if(!discord){ msg.className='form-msg err'; msg.textContent='Please enter your Discord username.'; return; }
  if(isTribe&&!tribeName){ msg.className='form-msg err'; msg.textContent='Please enter your tribe name.'; return; }
  if(!sel.value){ msg.className='form-msg err'; msg.textContent='Please select a payment method.'; return; }
  document.getElementById('checkoutBtn').disabled=true;
  msg.className='form-msg'; msg.textContent='Placing order...';
  var key=sel.value, label=sel.options[sel.selectedIndex]?sel.options[sel.selectedIndex].textContent:key;

  // Replicate pricing logic from renderSummary
  function poLiveTek(it){
    var g=it.gender;
    var base=it._rawTek||150;
    var isNI=base===250;
    var isLL=base===50;
    if(isNI){
      if(!isNaN(Number(g))&&Number(g)>0) return Math.round(base*Number(g)*(isTribe?0.8:1));
      if(g==='Male'||g==='Female') return isTribe?200:250;
      if(g==='Pair x2') return isTribe?400:500;
      if(g==='Pair x2 +1 Female') return isTribe?600:750;
      return it.tek||0;
    }
    if(isLL){
      if(!isNaN(Number(g))&&Number(g)>0) return Math.round(50*Number(g));
      if(g==='Male'||g==='Female') return 50;
      if(g==='Pair x2') return 100;
      if(g==='Pair x2 +1 Female') return 150;
      return it.tek||0;
    }
    if(base===200){
      if(!isNaN(Number(g))&&Number(g)>0) return Math.round(200*Number(g)*(isTribe?0.75:1));
      if(g==='Male'||g==='Female') return isTribe?150:200;
      if(g==='Pair x2') return isTribe?300:400;
      if(g==='Pair x2 +1 Female') return isTribe?450:600;
      return it.tek||0;
    }
    var mult=isTribe?(2/3):1;
    if(!isNaN(Number(g))&&Number(g)>0) return Math.round(base*Number(g)*mult);
    if(g==='Male'||g==='Female') return Math.round(base*mult);
    if(g==='Pair x2') return Math.round(base*2*mult);
    if(g==='Pair x2 +1 Female') return Math.round(base*3*mult);
    return it.tek||0;
  }
  function poLiveVal(it){
    if(key!=='tek'){ var tk=it.tek||0; var ltk=poLiveTek(it); var r2=tk>0?ltk/tk:1; return Math.round((it[key]||0)*r2); }
    return poLiveTek(it);
  }
  var stdTek=isTribe?100:150;
  var pairCount=basket.filter(function(it){ return it.gender==='Pair x2'&&(it._rawTek||0)===150; }).length;
  var bundles=Math.floor(pairCount/3);
  var bundlePrice=isTribe?500:750;
  var tekTotal=basket.reduce(function(t,it){ return t+poLiveTek(it); },0);
  var ratio=tekTotal>0?basket.reduce(function(t,it){ return t+poLiveVal(it); },0)/tekTotal:1;
  var bundlePriceScaled=Math.round(bundlePrice*ratio);
  var pairIdxs=[];
  basket.forEach(function(it,i){ if(it.gender==='Pair x2'&&(it._rawTek||0)===150) pairIdxs.push(i); });
  var bundledIdxs=pairIdxs.slice(0,bundles*3);

  var items=basket.map(function(it,i){
    var isBundled=bundledIdxs.indexOf(i)!==-1;
    var cost=isBundled?0:poLiveVal(it);
    var genderMarked=isBundled?'__BUNDLED__':it.gender;
    return {creature:it.creature,level:it.level,variant:it.variant,gender:genderMarked,cost:cost,imageUrl:it.imageUrl||'',type:it.type||''};
  });

  // Add one bundle summary row per bundle
  for(var b=0;b<bundles;b++){
    var bIdxs=bundledIdxs.slice(b*3,(b+1)*3);
    var bundleCreatures=bIdxs.map(function(i){ return basket[i].creature; }).join(' + ');
    items.push({creature:'Bundle '+(b+1)+': '+bundleCreatures,level:'',variant:'3x Pair x2',gender:'Bundle Deal',cost:bundlePriceScaled,imageUrl:'',type:'Bundle'});
  }

  var orderNotes=(notes?notes+'\n':'')+(isTribe?'Tribe: '+tribeName+' (On Server pricing applied)':'')+(bundles>0?'\nBundle deals: '+bundles+'x ('+bundlePriceScaled+' '+label+' each)':'');
  var payload = JSON.stringify({customerName:name,discord:discord,notes:orderNotes,paymentMethod:label,items:items,tribeName:tribeName});
  fetch(ORDER_URL + '?data=' + encodeURIComponent(payload), {
    method: 'GET'
  }).then(function(){
    msg.className='form-msg ok'; msg.textContent='Order placed! We will contact you on Discord.';
    basket=[]; updateCount(); renderBasket(); rebuildPaymentDropdown();
    document.getElementById('custName').value=''; document.getElementById('custDiscord').value='';
    document.getElementById('custNotes').value=''; document.getElementById('tribeCheck').checked=false;
    document.getElementById('tribeName').value=''; document.getElementById('tribeNameRow').style.display='none';
    document.getElementById('checkoutBtn').disabled=false;
    setTimeout(function(){ openQueue(); }, 1500);
  }).catch(function(){
    msg.className='form-msg ok'; msg.textContent='Order placed! We will contact you on Discord.';
    basket=[]; updateCount(); renderBasket(); rebuildPaymentDropdown();
    document.getElementById('checkoutBtn').disabled=false;
  });
}

// ── MOBILE OVERLAY ────────────────────────────────────────────
function openOverlay(gi){ overlayIdx=gi; renderOverlay(); document.getElementById('cardOverlay').classList.add('open'); document.body.style.overflow='hidden'; }
function closeOverlay(){ document.getElementById('cardOverlay').classList.remove('open'); document.body.style.overflow=''; }
function overlayNav(dir){ var filtered=getFiltered(); overlayIdx=Math.max(0,Math.min(filtered.length-1,overlayIdx+dir)); renderOverlay(); }
function renderOverlay(){
  var filtered=getFiltered();
  if(!filtered.length) return;
  var group=filtered[overlayIdx];
  var tmp=document.createElement('div');
  tmp.className='card';
  tmp.style.cssText='border-radius:0;border:none;min-height:100%;background:#1a1a2e;width:100%;max-width:100%';
  tmp.dataset.group=JSON.stringify(group);
  tmp.dataset.gi=String(overlayIdx);
  tmp.innerHTML=buildCardHTML(group,0);
  wireCardImages(tmp);
  var content=document.getElementById('overlayContent');
  content.innerHTML=''; content.appendChild(tmp); content.scrollTop=0;
  document.getElementById('overlayPos').textContent=(overlayIdx+1)+' / '+filtered.length;
  document.getElementById('overlayPrev').disabled=(overlayIdx===0);
  document.getElementById('overlayNext').disabled=(overlayIdx===filtered.length-1);
}

// ── EVENT LISTENERS ───────────────────────────────────────────
function updateSidebarTop(){
  var header=document.querySelector('.shop-header');
  var controls=document.querySelector('.controls');
  if(header){
    var hh=header.offsetHeight;
    document.documentElement.style.setProperty('--header-h', hh+'px');
    if(controls){
      var top=hh+controls.offsetHeight;
      document.documentElement.style.setProperty('--sidebar-top', top+'px');
    }
  }
  var isMobile=window.innerWidth<=768;
  document.documentElement.style.setProperty('--grid-left', isMobile?'0':'200px');
}

window.addEventListener('load', function() {
  // Landing buttons
  document.querySelectorAll('.cat-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var type = btn.dataset.type !== undefined ? btn.dataset.type : '';
      enterShop(type);
    });
  });
  document.getElementById('btn-all').addEventListener('click', function() { enterShop(''); });

  // Shop controls
  document.getElementById('backBtn').addEventListener('click', goBack);
  document.getElementById('basketOpenBtn').addEventListener('click', openBasket);
  document.getElementById('overlayBasketBtn').addEventListener('click', openBasket);
  document.getElementById('basketCloseBtn').addEventListener('click', closeBasket);
  document.getElementById('basketOverlay').addEventListener('click', closeBasket);
  document.getElementById('overlayClose').addEventListener('click', closeOverlay);
  document.getElementById('overlayPrev').addEventListener('click', function(){ overlayNav(-1); });
  document.getElementById('overlayNext').addEventListener('click', function(){ overlayNav(1); });
  document.getElementById('sidebarToggle').addEventListener('click', function(){
  var sb=document.getElementById('sidebar');
  var grid=document.getElementById('grid');
  if(window.innerWidth<=768){
    sb.classList.toggle('open');
  } else {
    sb.classList.toggle('closed');
    var isClosed=sb.classList.contains('closed');
    if(grid) grid.style.marginLeft=isClosed?'0':'200px';
  }
});
  document.getElementById('checkoutBtn').addEventListener('click', placeOrder);
  document.getElementById('tribeCheck').addEventListener('change', function(){
    document.getElementById('tribeNameRow').style.display=this.checked?'flex':'none';
    renderSummary();
  });
  document.getElementById('tribeName').addEventListener('input', renderSummary);
  document.getElementById('search').addEventListener('input', applyFilters);
  document.getElementById('typeFilter').addEventListener('change', applyFilters);
  document.getElementById('creatureFilter').addEventListener('change', applyFilters);
  document.getElementById('variantFilter').addEventListener('change', applyFilters);
  document.getElementById('paymentSelect').addEventListener('change', renderSummary);

  // Swipe
  var sx=0, sy=0;
  document.getElementById('overlayContent').addEventListener('touchstart',function(e){ sx=e.touches[0].clientX; sy=e.touches[0].clientY; },{passive:true});
  document.getElementById('overlayContent').addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50) overlayNav(dx<0?1:-1);
  },{passive:true});

  // Load data
  loadData();
  updateSidebarTop();
  window.addEventListener('resize', updateSidebarTop);
});

function openQueue(){
  document.getElementById('queueOverlay').style.display='block';
  document.body.style.overflow='hidden';
  loadQueue();
}
function closeQueue(){
  document.getElementById('queueOverlay').style.display='none';
  document.body.style.overflow='';
}

function loadQueue(){
  var el=document.getElementById('queueContent');
  el.innerHTML='<p style="color:#aaa;text-align:center;padding:20px">Loading...</p>';
  var base='https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/';
  var key='AIzaSyBcG7QFFQrWg4Wqgc2dSqGLGM5zg1BbINc';
  fetch(base+'Orders?key='+key)
    .then(function(r){ return r.json(); })
    .then(function(data){
      renderQueue(data.values||[]);
    })
    .catch(function(){
      el.innerHTML='<p style="color:#e94560;text-align:center">Could not load queue.</p>';
    });
}

function renderQueue(rows){
  var el=document.getElementById('queueContent');
  if(!rows.length){ el.innerHTML='<p style="color:#aaa;text-align:center">No orders yet.</p>'; return; }

  var hdrs=rows[0];
  var timeIdx=hdrs.indexOf('Time Ordered');
  var nameIdx=hdrs.indexOf('Name');
  if(nameIdx<0) nameIdx=hdrs.indexOf('Customer Name');
  var creatureIdx=hdrs.indexOf('Creature');
  var variantIdx=hdrs.indexOf('Variant');
  var genderIdx=hdrs.indexOf('Singles or Pairs');
  var costIdx=hdrs.indexOf('Cost');

  // Group by name + time — different times = separate queue entries
  var orders=[];
  var orderMap={};
  for(var i=1;i<rows.length;i++){
    var row=rows[i];
    if(!row||!row.length||!row.join('').trim()) continue;
    var name=String(row[nameIdx]||'').trim();
    var time=String(row[timeIdx]||'').trim();
    var creature=String(row[creatureIdx]||'').trim();
    var variant=variantIdx>=0?String(row[variantIdx]||'').trim():'';
    var gender=genderIdx>=0?String(row[genderIdx]||'').trim():'';
    var cost=String(row[costIdx]||'').trim();
    if(cost.indexOf('Total')!==-1) continue;
    var costStr=cost.replace(/\s/g,''); // strip all whitespace
    if(costStr==='0'||costStr.match(/:\d*0+$/)&&!costStr.match(/:[1-9]/)) continue; // skip bundled items
    if(gender==='__BUNDLED__') continue; // skip individual bundled items
    if(!creature||!name||!time) continue;
    var key=name+'|||'+time;
    if(!orderMap[key]){
      orderMap[key]={name:name,time:time,creatures:[]};
      orders.push(orderMap[key]);
    }
    var genderClean=gender==='Bundle Deal'?'':gender;
var label=creature+(variant&&variant!=='__BUNDLED__'?' ('+variant+')':'')+(genderClean?' · '+genderClean:'');
    orderMap[key].creatures.push(label);
  }

  if(!orders.length){ el.innerHTML='<p style="color:#aaa;text-align:center">No orders in queue.</p>'; return; }

  orders.sort(function(a,b){ return a.time.localeCompare(b.time); });

  var myName=(document.getElementById('custName')||{}).value||'';

  var html='<p style="color:#aaa;font-size:12px;margin-bottom:12px">'+orders.length+' order'+(orders.length!==1?'s':'')+' in queue</p>';
  orders.forEach(function(o,i){
    var isMe=myName&&o.name.toLowerCase()===myName.toLowerCase();
    var youBadge=isMe?'<span class="queue-you">YOU</span>':'';
    var creatureLines=o.creatures.map(function(c){ return '<div style="padding:2px 0">• '+c+'</div>'; }).join('');
    html+='<div class="queue-item'+(isMe?' queue-mine':'')+'">';
    html+='<div style="display:flex;align-items:center;margin-bottom:6px">';
    html+='<span class="queue-num">#'+(i+1)+'</span>';
    html+='<span class="queue-name">'+o.name+youBadge+'</span>';
    html+='<span class="queue-time">'+o.time+'</span>';
    html+='</div>';
    html+='<div class="queue-creatures">'+creatureLines+'</div>';
    html+='</div>';
  });

  el.innerHTML=html;
}

</script>
